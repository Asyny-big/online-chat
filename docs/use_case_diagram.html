<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>GovChat — Диаграмма вариантов использования</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #fff;
        }

        svg text {
            font-family: 'Times New Roman', Times, serif;
        }
    </style>
</head>

<body>
    <svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1300" viewBox="0 0 1700 1300">
        <defs>
            <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="none" stroke="#000" stroke-width="1" />
            </marker>
        </defs>

        <!-- ============ ACTOR ============ -->
        <!-- Center point at (750, 440) -->
        <circle cx="750" cy="400" r="16" fill="none" stroke="#000" stroke-width="2" />
        <line x1="750" y1="416" x2="750" y2="470" stroke="#000" stroke-width="2" />
        <line x1="750" y1="435" x2="715" y2="458" stroke="#000" stroke-width="2" />
        <line x1="750" y1="435" x2="785" y2="458" stroke="#000" stroke-width="2" />
        <line x1="750" y1="470" x2="720" y2="508" stroke="#000" stroke-width="2" />
        <line x1="750" y1="470" x2="780" y2="508" stroke="#000" stroke-width="2" />
        <text x="750" y="535" text-anchor="middle" font-size="16" fill="#000">Пользователь</text>

        <!-- ============ ASSOCIATION LINES (solid, no arrows) ============ -->
        <!-- All lines originate from the center area of the actor body (~750, 440) -->
        <!-- They go to the EDGE of each primary use case ellipse -->

        <!-- LEFT SIDE -->
        <!-- To Авторизоваться -->
        <line x1="735" y1="420" x2="485" y2="285" stroke="#000" stroke-width="1.3" />
        <!-- To Создать объявление (аналог - Отправить сообщение) -->
        <line x1="720" y1="450" x2="430" y2="440" stroke="#000" stroke-width="1.3" />
        <!-- To Создать отчёт (аналог - Создать групповой чат) -->
        <line x1="730" y1="475" x2="470" y2="650" stroke="#000" stroke-width="1.3" />

        <!-- TOP -->
        <!-- To Просмотреть объявления (аналог - Просмотреть контакты) -->
        <line x1="740" y1="400" x2="560" y2="150" stroke="#000" stroke-width="1.3" />
        <!-- To Просмотреть запросы (аналог - Просмотреть ленту) -->
        <line x1="750" y1="384" x2="750" y2="170" stroke="#000" stroke-width="1.3" />
        <!-- To Просмотреть отчёт (аналог  - Просмотреть профили) -->
        <line x1="760" y1="400" x2="940" y2="160" stroke="#000" stroke-width="1.3" />

        <!-- RIGHT SIDE -->
        <!-- To Просмотреть информацию (аналог - Редактировать профиль) -->
        <line x1="770" y1="415" x2="1050" y2="280" stroke="#000" stroke-width="1.3" />
        <!-- To Создать запрос (аналог - Опубликовать пост) -->
        <line x1="780" y1="440" x2="1080" y2="400" stroke="#000" stroke-width="1.3" />
        <!-- To Ответить на запись -->
        <line x1="770" y1="470" x2="1030" y2="600" stroke="#000" stroke-width="1.3" />
        <!-- To Совершить видеозвонок -->
        <line x1="780" y1="480" x2="1100" y2="520" stroke="#000" stroke-width="1.3" />

        <!-- ============ PRIMARY USE CASES ============ -->

        <!-- === TOP-LEFT: Авторизоваться === -->
        <ellipse cx="410" cy="265" rx="100" ry="32" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="410" y="270" text-anchor="middle" font-size="14" fill="#000">Авторизоваться</text>

        <!-- Зарегистрироваться — «расширяет» → Авторизоваться -->
        <ellipse cx="175" cy="195" rx="110" ry="30" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="175" y="200" text-anchor="middle" font-size="13" fill="#000">Зарегистрироваться</text>
        <line x1="255" y1="218" x2="340" y2="243" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="290" y="222" text-anchor="middle" font-size="11" fill="#000">«расширяет»</text>

        <!-- === LEFT: Отправить сообщение === -->
        <ellipse cx="340" cy="435" rx="120" ry="32" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="340" y="430" text-anchor="middle" font-size="13" fill="#000">Отправить</text>
        <text x="340" y="446" text-anchor="middle" font-size="13" fill="#000">сообщение</text>

        <!-- Добавить вложение — «включает» -->
        <ellipse cx="130" cy="370" rx="105" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="130" y="375" text-anchor="middle" font-size="12" fill="#000">Добавить вложение</text>
        <line x1="250" y1="413" x2="200" y2="393" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="200" y="408" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- Отправить голосовое сообщение — «расширяет» -->
        <ellipse cx="120" cy="500" rx="115" ry="32" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="120" y="495" text-anchor="middle" font-size="12" fill="#000">Отправить голосовое</text>
        <text x="120" y="511" text-anchor="middle" font-size="12" fill="#000">сообщение</text>
        <line x1="210" y1="480" x2="265" y2="460" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="215" y="475" text-anchor="middle" font-size="11" fill="#000">«расширяет»</text>

        <!-- Добавить описание — «включает» -->
        <ellipse cx="140" cy="440" rx="100" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="140" y="445" text-anchor="middle" font-size="12" fill="#000">Добавить описание</text>
        <line x1="222" y1="435" x2="220" y2="435" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />

        <!-- === BOTTOM-LEFT: Создать групповой чат === -->
        <ellipse cx="390" cy="650" rx="130" ry="35" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="390" y="645" text-anchor="middle" font-size="13" fill="#000">Создать групповой</text>
        <text x="390" y="662" text-anchor="middle" font-size="13" fill="#000">чат</text>

        <!-- Выбрать участников — «включает» -->
        <ellipse cx="215" cy="590" rx="110" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="215" y="595" text-anchor="middle" font-size="12" fill="#000">Выбрать участников</text>
        <line x1="305" y1="620" x2="290" y2="610" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="285" y="608" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- Выбрать запись — «включает» -->
        <ellipse cx="210" cy="720" rx="95" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="210" y="725" text-anchor="middle" font-size="12" fill="#000">Выбрать название</text>
        <line x1="290" y1="680" x2="270" y2="700" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="255" y="688" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- Добавить фотографию — «включает» -->
        <ellipse cx="230" cy="800" rx="115" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="230" y="805" text-anchor="middle" font-size="12" fill="#000">Добавить фотографию</text>
        <line x1="320" y1="680" x2="295" y2="775" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="280" y="740" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- Добавить описание2 — «включает» -->
        <ellipse cx="430" cy="820" rx="105" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="430" y="825" text-anchor="middle" font-size="12" fill="#000">Добавить описание</text>
        <line x1="400" y1="685" x2="420" y2="793" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="395" y="755" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- === TOP-CENTER-LEFT: Просмотреть контакты === -->
        <ellipse cx="500" cy="130" rx="140" ry="35" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="500" y="125" text-anchor="middle" font-size="13" fill="#000">Просмотреть контакты</text>
        <text x="500" y="143" text-anchor="middle" font-size="13" fill="#000">пользователей</text>

        <!-- === TOP-CENTER: Просмотреть ленту === -->
        <ellipse cx="750" cy="130" rx="120" ry="35" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="750" y="136" text-anchor="middle" font-size="14" fill="#000">Просмотреть ленту</text>

        <!-- === TOP-RIGHT: Просмотреть профили === -->
        <ellipse cx="980" cy="130" rx="120" ry="35" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="980" y="136" text-anchor="middle" font-size="14" fill="#000">Просмотреть профиль</text>

        <!-- Просмотреть архив — «расширяет» Просмотреть профиль -->
        <ellipse cx="1230" cy="70" rx="120" ry="30" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="1230" y="65" text-anchor="middle" font-size="12" fill="#000">Просмотреть архив</text>
        <text x="1230" y="80" text-anchor="middle" font-size="12" fill="#000">сообщений</text>
        <line x1="1140" y1="88" x2="1065" y2="108" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="1105" y="90" text-anchor="middle" font-size="11" fill="#000">«расширяет»</text>

        <!-- === RIGHT-TOP: Редактировать профиль === -->
        <ellipse cx="1120" cy="270" rx="130" ry="35" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="1120" y="265" text-anchor="middle" font-size="13" fill="#000">Редактировать</text>
        <text x="1120" y="282" text-anchor="middle" font-size="13" fill="#000">профиль</text>

        <!-- Загрузить аватар — «включает» -->
        <ellipse cx="1370" cy="210" rx="105" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="1370" y="215" text-anchor="middle" font-size="12" fill="#000">Загрузить аватар</text>
        <line x1="1235" y1="252" x2="1295" y2="232" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="1285" y="248" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- Изменить статус — «расширяет» -->
        <ellipse cx="1380" cy="310" rx="100" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="1380" y="315" text-anchor="middle" font-size="12" fill="#000">Изменить статус</text>
        <line x1="1305" y1="300" x2="1245" y2="285" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="1300" y="297" text-anchor="middle" font-size="11" fill="#000">«расширяет»</text>

        <!-- === RIGHT: Опубликовать пост === -->
        <ellipse cx="1150" cy="400" rx="120" ry="34" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="1150" y="395" text-anchor="middle" font-size="13" fill="#000">Опубликовать</text>
        <text x="1150" y="412" text-anchor="middle" font-size="13" fill="#000">пост</text>

        <!-- Добавить фото к посту — «включает» -->
        <ellipse cx="1420" cy="390" rx="115" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="1420" y="385" text-anchor="middle" font-size="12" fill="#000">Добавить</text>
        <text x="1420" y="400" text-anchor="middle" font-size="12" fill="#000">фотографию</text>
        <line x1="1265" y1="392" x2="1330" y2="390" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="1295" y="382" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- Добавить описание к посту — «включает» -->
        <ellipse cx="1400" cy="460" rx="105" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="1400" y="465" text-anchor="middle" font-size="12" fill="#000">Добавить описание</text>
        <line x1="1260" y1="425" x2="1320" y2="448" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="1305" y="428" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- === RIGHT-CENTER: Совершить видеозвонок === -->
        <ellipse cx="1170" cy="520" rx="120" ry="34" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="1170" y="515" text-anchor="middle" font-size="13" fill="#000">Совершить</text>
        <text x="1170" y="532" text-anchor="middle" font-size="13" fill="#000">видеозвонок</text>

        <!-- Демонстрация экрана — «расширяет» видеозвонок -->
        <ellipse cx="1430" cy="540" rx="120" ry="30" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="1430" y="535" text-anchor="middle" font-size="12" fill="#000">Демонстрация</text>
        <text x="1430" y="550" text-anchor="middle" font-size="12" fill="#000">экрана</text>
        <line x1="1340" y1="535" x2="1285" y2="528" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="1340" y="523" text-anchor="middle" font-size="11" fill="#000">«расширяет»</text>

        <!-- === BOTTOM-RIGHT: Ответить на запись === -->
        <ellipse cx="1080" cy="610" rx="120" ry="34" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="1080" y="615" text-anchor="middle" font-size="14" fill="#000">Ответить на запись</text>

        <!-- Добавить комментарий — «включает» Ответить на запись -->
        <ellipse cx="1320" cy="660" rx="115" ry="30" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="1320" y="655" text-anchor="middle" font-size="12" fill="#000">Добавить</text>
        <text x="1320" y="670" text-anchor="middle" font-size="12" fill="#000">комментарий</text>
        <line x1="1195" y1="630" x2="1235" y2="643" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="1230" y="628" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- Поставить реакцию — «включает» Ответить на запись -->
        <ellipse cx="1330" cy="730" rx="110" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="1330" y="735" text-anchor="middle" font-size="12" fill="#000">Поставить реакцию</text>
        <line x1="1190" y1="640" x2="1255" y2="712" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="1240" y="680" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- Перейти в чат с пользователем — «включает» Ответить на запись -->
        <ellipse cx="1310" cy="800" rx="130" ry="32" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="1310" y="795" text-anchor="middle" font-size="12" fill="#000">Перейти в чат</text>
        <text x="1310" y="811" text-anchor="middle" font-size="12" fill="#000">с пользователем</text>
        <line x1="1160" y1="640" x2="1230" y2="775" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="1175" y="725" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- === BOTTOM-CENTER: Управлять друзьями === -->
        <ellipse cx="700" cy="720" rx="120" ry="34" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="700" y="715" text-anchor="middle" font-size="13" fill="#000">Управлять</text>
        <text x="700" y="732" text-anchor="middle" font-size="13" fill="#000">друзьями</text>
        <line x1="745" y1="508" x2="710" y2="688" stroke="#000" stroke-width="1.3" />

        <!-- Добавить в друзья — «включает» -->
        <ellipse cx="540" cy="810" rx="105" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="540" y="815" text-anchor="middle" font-size="12" fill="#000">Добавить в друзья</text>
        <line x1="630" y1="748" x2="600" y2="786" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="590" y="770" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- Удалить из друзей — «включает» -->
        <ellipse cx="810" cy="830" rx="110" ry="28" fill="none" stroke="#000" stroke-width="1.3" />
        <text x="810" y="835" text-anchor="middle" font-size="12" fill="#000">Удалить из друзей</text>
        <line x1="760" y1="752" x2="790" y2="805" stroke="#000" stroke-width="1" stroke-dasharray="7,4"
            marker-end="url(#arr)" />
        <text x="800" y="780" text-anchor="middle" font-size="11" fill="#000">«включает»</text>

        <!-- === Поиск пользователей === -->
        <ellipse cx="950" cy="700" rx="120" ry="32" fill="none" stroke="#000" stroke-width="1.5" />
        <text x="950" y="695" text-anchor="middle" font-size="13" fill="#000">Поиск</text>
        <text x="950" y="712" text-anchor="middle" font-size="13" fill="#000">пользователей</text>
        <line x1="770" y1="490" x2="870" y2="675" stroke="#000" stroke-width="1.3" />

    </svg>
</body>

</html>
