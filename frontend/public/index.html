  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%231a1d29'/><text x='90' y='130' font-size='120' text-anchor='middle' fill='%2300c3ff'>🦆</text></svg>" />

  <!-- Structured Data -->
  <script type="application/ld+json">

    "@context": "https://schema.org",

      "price": "0",

    },

      "Кастомные темы оформления"
    ]
  }
  </script>
  
  <!-- Critical CSS — Тёмная тема по умолчанию -->
  <style>
    /* Reset & Base */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #e4e6eb;
      background: linear-gradient(135deg, #1a1d29 0%, #252a3d 100%);
      overscroll-behavior: none;
    }
    
    #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }
    
    /* Предотвращение белой вспышки */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1d29;
      z-index: -1;
    }
    
    /* Loader (опционально — пока React грузится) */
    #root:empty::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 40px;
      height: 40px;
      margin: -20px 0 0 -20px;
      border: 3px solid rgba(0, 195, 255, 0.2);
      border-top-color: #00c3ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* NoScript */
    noscript {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
      text-align: center;
      font-size: 1.125rem;
      color: #00c3ff;
      background: #1a1d29;
    }
    
    /* Mobile optimizations */
    @media (max-width: 768px) {
      body {
        font-size: 14px;
      }
      
      #root {
        height: 100vh;
        height: -webkit-fill-available;
      }
    }
    
    /* Высокий DPI */
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
      body {
        -webkit-font-smoothing: subpixel-antialiased;
      }
    }
    
    /* Анимации для звонков (из React) */
    @keyframes pulse {
      0%, 100% { 
        opacity: 1; 
        transform: scale(1); 
      }
      50% { 
        opacity: 0.7; 
        transform: scale(1.2); 
      }
    }
    
    @keyframes callPulse {
      0%, 100% { 
        opacity: 1; 
        transform: scale(1); 
        box-shadow: 0 0 6px #ff4757;
      }
      50% { 
        opacity: 0.7; 
        transform: scale(1.3); 
        box-shadow: 0 0 12px #ff4757;
      }
    }
    
    /* Анимация мигания (для индикатора печати) */
    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0.3; }
    }
    
    /* Скроллбар */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    
    /* Выделение текста */
    ::selection {
      background: rgba(59, 130, 246, 0.4);
      color: #fff;
    }
    
    /* Фокус на input */
    input:focus, textarea:focus, button:focus {
      outline: none;
    }
    
    input:focus, textarea:focus {
      border-color: #3b82f6 !important;
    }
    
    /* Hover/active для кнопок */
    button:hover:not(:disabled) {
      filter: brightness(1.1);
    }
    
    button:active:not(:disabled) {
      transform: scale(0.98);
    }
    
    /* Плавные переходы для всех интерактивных элементов */
    button, input, textarea, a {
      transition: all 0.15s ease;
    }
    
    /* Отключенные элементы */
    button:disabled, input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    /* Native audio controls should keep browser defaults. */
  </style>
</head>
<body>
  <noscript>

</body>
</html>
